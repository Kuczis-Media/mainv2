<!doctype html>
<html lang="pl">
<head>
  <base href="/members/module/forms/">
  <meta charset="utf-8">
  <meta name="x-members" content="1">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <meta name="color-scheme" content="dark light">
  <title>Test – ChemDisk</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/Kuczis-Media/logo/benzene-ring.svg" type="image/svg+xml">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="/assets/js/auth.js"></script>
  <style>
    :root {
      --bg: #eaf7ef;
      --card: rgba(16, 34, 25, .94);
      --text: #f8fafc;
      --muted: #cbd5e1;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
    .stage { position: fixed; inset: 0; isolation: isolate; }
    #form { width: 100%; height: 100%; border: 0; display: block; background: #fff; opacity: 0; transition: opacity 180ms ease; }
    .stage.ready #form { opacity: 1; }
    .panel {
      position: fixed; inset: 0; z-index: 2; display: grid; place-items: center;
      padding: 24px; color: var(--text); text-align: center;
      background: radial-gradient(circle at 20% 10%, rgba(34,197,94,.32), transparent 42%), rgba(4, 12, 8, .82);
      backdrop-filter: blur(8px);
    }
    .panel[hidden] { display: none; }
    .card { width: min(92vw, 620px); padding: 24px; border: 1px solid rgba(255,255,255,.12); border-radius: 18px; background: var(--card); box-shadow: 0 24px 70px rgba(0,0,0,.32); }
    .card h1 { margin: 0 0 8px; font-size: clamp(1.2rem, 3vw, 1.55rem); }
    .card p { margin: 8px 0; color: var(--muted); }
    .spinner { width: 34px; height: 34px; margin: 0 auto 16px; border: 3px solid rgba(255,255,255,.18); border-top-color: #4ade80; border-radius: 50%; animation: spin .8s linear infinite; }
    code { padding: 2px 6px; border-radius: 6px; background: rgba(255,255,255,.1); overflow-wrap: anywhere; }
    button { margin-top: 12px; padding: 10px 16px; border: 0; border-radius: 10px; background: #16a34a; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { #form { transition: none; } .spinner { animation: none; } }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-busy="true">
    <iframe id="form" title="Test Google Forms" loading="eager" referrerpolicy="no-referrer" allow="fullscreen"></iframe>
    <div class="panel" id="loader" role="status" aria-live="polite">
      <div class="card">
        <div class="spinner" aria-hidden="true"></div>
        <h1>Ładowanie formularza…</h1>
        <p id="loaderHint">To może potrwać chwilę przy wolniejszym łączu.</p>
        <button id="retry" type="button" hidden>Spróbuj ponownie</button>
      </div>
    </div>
    <div class="panel" id="error" role="alert" hidden>
      <div class="card">
        <h1>Nieprawidłowy lub brakujący identyfikator</h1>
        <p>Użyj <code>?id=FORM_ID</code> albo przekaż pełny link do Google Forms.</p>
        <p>Obsługiwane są linki <code>docs.google.com/forms/…</code> i <code>forms.gle/…</code>.</p>
      </div>
    </div>
  </main>

  <script>
  (async () => {
    'use strict';

    const initialParams = new URLSearchParams(location.search);
    const initialFromUrl = (initialParams.get('id') || '').trim();
    if (initialFromUrl) stripQuery();

    const authState = await window.ChemAuth.ready;
    if (!authState?.authenticated || !authState.session?.ok) return;

    const STORAGE_KEY = 'chemdisk.forms.v2';
    const stage = document.getElementById('stage');
    const frame = document.getElementById('form');
    const loader = document.getElementById('loader');
    const error = document.getElementById('error');
    const hint = document.getElementById('loaderHint');
    const retry = document.getElementById('retry');
    let source = '';
    let timeout = 0;

    const decode = (value) => {
      try { return decodeURIComponent(value); }
      catch { return value; }
    };

    const validId = (value) => /^[A-Za-z0-9_-]{10,200}$/.test(value || '');

    function normalizeInput(input) {
      const raw = decode(String(input || '').trim());
      if (!raw) return '';

      if (/^https?:\/\//i.test(raw)) {
        try {
          const url = new URL(raw);
          const host = url.hostname.toLowerCase();
          if (host === 'forms.gle' || host === 'www.forms.gle') {
            url.protocol = 'https:';
            url.searchParams.set('embedded', 'true');
            return url.toString();
          }
          if (host !== 'docs.google.com') return '';
          const match = url.pathname.match(/^\/forms\/d\/(e\/)?([A-Za-z0-9_-]{10,200})(?:\/|$)/i);
          if (!match) return '';
          const variant = match[1] ? 'e/' : '';
          const id = match[2];
          url.pathname = `/forms/d/${variant}${id}/viewform`;
          url.searchParams.delete('edit_requested');
          url.searchParams.set('embedded', 'true');
          url.hash = '';
          return url.toString();
        } catch { return ''; }
      }

      if (!validId(raw)) return '';
      // Publiczne identyfikatory odpowiedzi zaczynają się zwykle od 1FAIpQL;
      // pozostałe identyfikatory korzystają z wariantu /d/ (jak link z edytora).
      const variant = raw.startsWith('1FAIpQL') ? 'e/' : '';
      return `https://docs.google.com/forms/d/${variant}${encodeURIComponent(raw)}/viewform?embedded=true`;
    }

    function save(raw) {
      try { sessionStorage.setItem(STORAGE_KEY, raw); } catch {}
    }

    function load() {
      try { return sessionStorage.getItem(STORAGE_KEY) || ''; }
      catch { return ''; }
    }

    function stripQuery() {
      try { history.replaceState({}, document.title, location.pathname + location.hash); }
      catch {}
    }

    function showError() {
      window.clearTimeout(timeout);
      loader.hidden = true;
      error.hidden = false;
      stage.removeAttribute('aria-busy');
    }

    function openForm() {
      if (!source) return showError();
      window.clearTimeout(timeout);
      error.hidden = true;
      loader.hidden = false;
      retry.hidden = true;
      hint.textContent = 'To może potrwać chwilę przy wolniejszym łączu.';
      stage.classList.remove('ready');
      stage.setAttribute('aria-busy', 'true');
      frame.src = source;
      timeout = window.setTimeout(() => {
        hint.textContent = 'Formularz ładuje się dłużej niż zwykle. Sprawdź połączenie lub uprawnienia formularza.';
        retry.hidden = false;
      }, 15000);
    }

    frame.addEventListener('load', () => {
      window.clearTimeout(timeout);
      stage.classList.add('ready');
      stage.removeAttribute('aria-busy');
      loader.hidden = true;
    });
    retry.addEventListener('click', openForm);

    const fromUrl = initialFromUrl;
    const raw = fromUrl || load();
    if (fromUrl) {
      save(fromUrl);
    }
    source = normalizeInput(raw);
    openForm();
  })();
  </script>
</body>
</html>
