<!doctype html>
<html lang="pl">
  <head>
    <base href="/members/module/whiteboard/" />
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/Kuczis-Media/logo/benzene-ring.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="x-members" content="1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Tablica tldraw - ChemDisk</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="/assets/js/auth.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0b0c; /* opcjonalnie ciemne tło */
      }
      .viewport {
        min-height: 100dvh; /* lepsze na mobile */
        height: 100vh;      /* fallback */
        width: 100vw;
        display: grid;
      }
      .viewport iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <iframe
        id="whiteboard-frame"
        data-src="https://www.tldraw.com/"
        title="Tablica tldraw"
        allow="clipboard-read; clipboard-write; fullscreen"
        allowfullscreen
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-downloads allow-forms allow-modals"
      ></iframe>
    </div>
    <script>
      (async () => {
        const authState = await window.ChemAuth.ready;
        if (!authState?.authenticated || !authState.session?.ok) return;
        const frame = document.getElementById('whiteboard-frame');
        if (frame) frame.src = frame.dataset.src || '';
      })();
    </script>
  </body>
</html>
